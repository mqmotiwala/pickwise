  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(b-a<1) return; let d='M'+xOf(a).toFixed(1)+' '+yOf(P[a]).toFixed(1)+' '; for(let i=a+1;i<=b;i++) d+='L'+xOf(i).toFixed(1)+' '+yOf(P[i]).toFixed(1)+' '; for(let i=b;i>=a;i--) d+='L'+xOf(i).toFixed(1)+' '+yOf(V[i]).toFixed(1)+' '; d+='Z'; gaps+='<path d=\"'+d+'\" fill=\"'+(s===1?ahead:behind)+'\"/>'; };\n    for(let d=31; d<=md; d++){ const s=P[d]>=V[d]?1:-1; if(s!==sign){ pushRun(start,d,sign); start=d; sign=s; } }\n    pushRun(start,md,sign);\n\n    // grid + axis labels\n    let grid='';\n    for(let v=0; v<=12000; v+=2000){ const y=yOf(v); grid+='<line x1=\"'+x0+'\" y1=\"'+y.toFixed(1)+'\" x2=\"'+x1+'\" y2=\"'+y.toFixed(1)+'\" stroke=\"'+t.grid+'\" stroke-width=\"1\"/>'; grid+='<text x=\"'+(x0-12)+'\" y=\"'+(y+4).toFixed(1)+'\" text-anchor=\"end\" fill=\"'+t.axis+'\" font-family=\"'+t.bodyFont+'\" font-size=\"13\" font-weight=\"500\">'+this.fmt(v)+'<\u002Ftext>'; }\n    const xt=[['Dec 01',9],['Jan 01',40],['Feb 01',71],['Mar 01',99],['Apr 01',130],['May 01',160],['Jun 01',191]];\n    xt.forEach(([lab,day])=>{ const x=xOf(day); grid+='<line x1=\"'+x.toFixed(1)+'\" y1=\"'+y0+'\" x2=\"'+x.toFixed(1)+'\" y2=\"'+y1+'\" stroke=\"'+t.grid+'\" stroke-width=\"1\"/>'; grid+='<text x=\"'+x.toFixed(1)+'\" y=\"'+(y1+24)+'\" text-anchor=\"middle\" fill=\"'+t.axis+'\" font-family=\"'+t.bodyFont+'\" font-size=\"13\" font-weight=\"500\">'+lab+'<\u002Ftext>'; });\n\n    // markers\n    let mk='';\n    this.markers.forEach(m=>{ const x=xOf(m.day), cy=yOf(P[m.day]); const below=P[m.day]>11500; const labelY=below?cy+34:Math.max(46,cy-26); const c1=below?cy+7:labelY+11; const c2=below?labelY-12:cy-6; const frac=(cum[m.day]/totalCum).toFixed(4);\n      mk+='<g class=\"pwmk\" data-frac=\"'+frac+'\" style=\"opacity:0;transform-box:fill-box;transform-origin:'+x.toFixed(1)+'px '+cy.toFixed(1)+'px;\">'\n        +'<line x1=\"'+x.toFixed(1)+'\" y1=\"'+c1.toFixed(1)+'\" x2=\"'+x.toFixed(1)+'\" y2=\"'+c2.toFixed(1)+'\" stroke=\"'+t.axis+'\" stroke-width=\"1.2\"/>'\n        +'<circle cx=\"'+x.t \"pwsheen\" d=\"'+linePath(P)+'\" fill=\"none\" stroke=\"'+sheenCore+'\" stroke-width=\"3.4\" stroke-linecap=\"round\" style=\"opacity:0\"/>'\n      +mk\n      +'<g id=\"pwends\" style=\"opacity:0\">'\n        +'<circle cx=\"'+endV.x.toFixed(1)+'\" cy=\"'+endV.y.toFixed(1)+'\" r=\"4\" fill=\"'+t.vtiC+'\" stroke=\"'+t.dotRing+'\" stroke-width=\"1.6\"/>'\n        +'<circle cx=\"'+endP.x.toFixed(1)+'\" cy=\"'+endP.y.toFixed(1)+'\" r=\"9\" fill=\"'+this.hexA(PR,.9)+'\" style=\"transform-box:fill-box;transform-origin:center;animation:pwhalo 2.4s ease-out infinite\"/>'\n        +'<circle cx=\"'+endP.x.toFixed(1)+'\" cy=\"'+endP.y.toFixed(1)+'\" r=\"4.6\" fill=\"'+pickC+'\" stroke=\"'+t.dotRing+'\" stroke-width=\"1.8\"'+pickFilter+'/>'\n      +'<\u002Fg>'\n      +'<g id=\"pwcross\" style=\"opacity:0;pointer-events:none\">'\n        +'<line id=\"pwcl\" x1=\"0\" y1=\"'+y0+'\" x2=\"0\" y2=\"'+y1+'\" stroke=\"'+t.axis+'\" stroke-width=\"1\" stroke-dasharray=\"4 4\"/>'\n        +'<circle id=\"pwcvd\" r=\"5\" fill=\"'+t.vtiC+'\" stroke=\"'+t.dotRing+'\" stroke-width=\"2\"/>'\n        +'<circle id=\"pwcpd\" r=\"5.5\" fill=\"'+pickC+'\" stroke=\"'+t.dotRing+'\" stroke-width=\"2\"/>'\n      +'<\u002Fg>'\n      +'<\u002Fsvg>';\n\n    const swatch=(c)=>'<span style=\"display:inline-block;width:18px;height:3px;border-radius:2px;background:'+c+'\"><\u002Fspan>';\n    const legend='<div style=\"display:flex;flex-direction:column;gap:7px;font-family:'+t.bodyFont+';font-size:12.5px;font-weight:600;color:'+t.ink+'\">'\n      +'<span style=\"display:flex;align-items:center;gap:8px\">'+swatch(pickC)+'Stock Picking Portfolio<\u002Fspan>'\n      +'<span style=\"display:flex;align-items:center;gap:8px\">'+swatch(t.vtiC)+'100% VTI Portfolio<\u002Fspan><\u002Fdiv>';\n\n    const big=t.prominent;\n    const perf='<div style=\"background:'+t.perfBg+';border:'+(t.tipBorder)+';border-radius:14px;padding:'+(big?'14px 16px':'11px 14px')+';font-family:'+t.bodyFont+';\">'\n      +'<div style=\"font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:'+t.perfSub+';font-weight:700;margin-bottom:3px;\">Your picks<\u002Fdiv>'\n      +'<div id=\"pwPick\" style=\"font-family:'+t.numFont+';font-size:'+(big?'30px':'24px')+';font-weight:'+(t.key==='editorial'?900:700)+';line-height:1;color:'+pickC+';\">$0<\u002Fdiv>'\n      +'<div style=\"font-size:12px;color:'+t.perfSub+';margin-top:5px;\">Market (VTI) <span style=\"color:'+t.perfInk+';font-weight:600\">'+this.fmt(this.finalVti)+'<\u002Fspan><\u002Fdiv>'\n      +'<div style=\"margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:'+ahead+';color:'+pickC+';font-weight:700;font-size:12.5px;padding:4px 9px;border-radius:8px;\"><span id=\"pwDelta\">+$0<\u002Fspan><span style=\"font-weight:500;opacity:.8\">vs market<\u002Fspan><\u002Fdiv>'\n      +'<\u002Fdiv>';\n\n    const overlay='<div style=\"position:absolute;left:18px;top:14px;display:flex;flex-direction:column;gap:13px;pointer-events:none;\">'+legend+perf+'<\u002Fdiv>'\n      +'<div id=\"pwtip\" style=\"position:absolute;display:none;transform:translate(-50%,calc(-100% - 14px));background:'+t.tipBg+';border:'+t.tipBorder+';border-radius:12px;padding:9px 12px;font-family:'+t.bodyFont+';box-shadow:0 8px 24px rgba(0,0,0,.16);pointer-events:none;white-space:nowrap;z-index:5;\"><\u002Fdiv>';\n\n    host.style.fontFamily=t.bodyFont;\n    if(t.cardBg2){ /* momentum: card panel handled by chrome */ }\n    host.innerHTML=svg+overlay;\n\n    // ---- animate ----\n    const numFontReady=t.numFont;\n    const $=(id)=>host.querySelector(id);\n    const pickEl=$('#pwpick'), vtiEl=$('#pwvti'), sheenEl=$('#pwsheen');\n    const clipRect=$('#pwclipRect'), perfPick=$('#pwPick'), perfDelta=$('#pwDelta');\n    const ends=$('#pwends');\n    const mks=[...host.querySelectorAll('.pwmk')];\n    const pickLen=pickEl.getTotalLength(), vtiLen=vtiEl.getTotalLength(), sheenLen=sheenEl.getTotalLength();\n    pickEl.style.strokeDasharray=pickLen; pickEl.style.strokeDashoffset=pickLen;\n    vtiEl.style.strokeDasharray=vtiLen; vtiEl.style.strokeDashoffset=vtiLen;\n    this.ready=false;\n    const DUR=2600, t0=performance.now();\n    const ease=p=>p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;\n    const frame=(now)=>{\n      const p=Math.min(1,(now-t0)/DUR), e=ease(p);\n      pickEl.style.strokeDashoffset=pickLen*(1-e);\n      vtiEl.style.strokeDashoffset=vtiLen*(1-e);\n      clipRect.setAttribute('width', ((x1-x0)*e).toFixed(1));\n      mks.forEach(m=>{ if(e>=parseFloat(m.dataset.frac) && m.style.opacity!=='1'){ m.style.opacity='1'; m.style.animation='pwpop .5s cubic-bezier(.2,.8,.3,1.3)'; } });\n      perfPick.textContent=this.fmt(this.finalPick*e);\n      perfDelta.textContent=(this.finalDelta>=0?'+':'−')+'$'+Math.round(Math.abs(this.finalDelta)*e).toLocaleString('en-US');\n      if(p<1){ this._raf=requestAnimationFrame(frame); } else { this.onDone(host,t,pickC,sheenEl,sheenLen,ends,VBW,VBH,x0,x1,y0,y1,xOf,yOf); }\n    };\n    this._raf=requestAnimationFrame(frame);\n  }\n\n  onDone(host,t,pickC,sheenEl,sheenLen,ends,VBW,VBH,x0,x1,y0,y1,xOf,yOf){\n    this.ready=true;\n    ends.style.opacity='1';\n    const sheenGlowEl=host.querySelector('#pwsheenGlow');\n    const dash='40 '+sheenLen;\n    sheenEl.style.opacity='1'; sheenEl.style.strokeDasharray=dash;\n    if(sheenGlowEl){ sheenGlowEl.style.opacity=(t.glow||t.tintCard)?'0.7':'0.45'; sheenGlowEl.style.strokeDasharray=dash; }\n    const kf=[{strokeDashoffset:sheenLen},{strokeDashoffset:0}];\n    const opt={duration:2700,iterations:Infinity,easing:'linear'};\n    try { this._sheen=sheenEl.animate(kf,opt); if(sheenGlowEl) this._sheenG=sheenGlowEl.animate(kf,opt); } catch(e){}\n    // hover\n    const svg=host.querySelector('#pwsvg');\n    const cross=host.querySelector('#pwcross'), cl=host.querySelector('#pwcl');\n    const cpd=host.querySelector('#pwcpd'), cvd=host.querySelector('#pwcvd'), tip=host.querySelector('#pwtip');\n    const md=this.maxDay, P=this.pick, V=this.vti;\n    const hide=()=>{ cross.style.opacity='0'; tip.style.display='none'; };\n    svg.addEventListener('mousemove',(ev)=>{\n      if(!this.ready) return;\n      const r=svg.getBoundingClientRect();\n      const vbx=(ev.clientX-r.left)/r.width*VBW;\n      if(vbx<x0||vbx>x1){ hide(); return; }\n      let day=Math.round((vbx-x0)/(x1-x0)*md); day=Math.max(0,Math.min(md,day));\n      if(day<30){ hide(); return; }\n      const x=xOf(day), yp=yOf(P[day]), yv=yOf(V[day]);\n      cl.setAttribute('x1',x.toFixed(1)); cl.setAttribute('x2',x.toFixed(1));\n      cpd.setAttribute('cx',x.toFixed(1)); cpd.setAttribute('cy',yp.toFixed(1));\n      cvd.setAttribute('cx',x.toFixed(1)); cvd.setAttribute('cy',yv.toFixed(1));\n      cross.style.opacity='1';\n      const dl=P[day]-V[day];\n      tip.innerHTML='<div style=\"font-size:11px;color:'+t.tipSub+';font-weight:600;margin-bottom:5px;\">'+this.dateOf(day)+'<\u002Fdiv>'\n        +'<div style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:'+t.tipInk+';\"><span style=\"width:9px;height:9px;border-radius:50%;background:'+pickC+'\"><\u002Fspan>Picks<span style=\"margin-left:auto;font-weight:700;font-family:'+t.numFont+'\">'+this.fmt(P[day])+'<\u002Fspan><\u002Fdiv>'\n        +'<div style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:'+t.tipInk+';margin-top:3px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:'+t.vtiC+'\"><\u002Fspan>Market<span style=\"margin-left:auto;font-weight:700;font-family:'+t.numFont+'\">'+this.fmt(V[day])+'<\u002Fspan><\u002Fdiv>'\n        +'<div style=\"margin-top:6px;padding-top:6px;border-top:'+t.tipBorder+';font-size:12.5px;font-weight:700;color:'+(dl>=0?pickC:'#d65442')+';\">'+(dl>=0?'▲ +':'▼ −')+'$'+Math.round(Math.abs(dl)).toLocaleString('en-US')+'<span style=\"color:'+t.tipSub+';font-weight:500\"> vs market<\u002Fspan><\u002Fdiv>';\n      tip.style.left=(x/VBW*100)+'%';\n      tip.style.top=(Math.min(yp,yv)/VBH*100)+'%';\n      tip.style.display='block';\n    });\n    svg.addEventListener('mouseleave',hide);\n  }\n\n  renderVals(){\n    const t=this.themes[this.effDir()];\n    const PR=this.primary();\n    const showSwitcher=this.props.showSwitcher === true;\n    const base='font-family:'+t.bodyFont+';font-size:13px;font-weight:600;padding:8px 17px;border-radius:999px;cursor:pointer;transition:all .15s;';\n    const tabStyle=(i)=> base+(i===this.effDir()\n      ? 'background:'+PR+';color:#fff;border:1px solid '+PR+';'\n      : 'background:#ffffff;color:#5b6b62;border:1px solid rgba(0,0,0,.13);');\n    return {\n      setDir0:()=>this.setState({direction:0}), setDir1:()=>this.setState({direction:1}),\n      setDir2:()=>this.setState({direction:2}), setDir3:()=>this.setState({direction:3}),\n      tab0Style:tabStyle(0), tab1Style:tabStyle(1), tab2Style:tabStyle(2), tab3Style:tabStyle(3),\n      setChartHost:this.setChartHost,\n      switcherStyle:(showSwitcher?'display:flex':'display:none')+';gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;',\n      pageStyle:'width:100%;background:transparent;font-family:'+t.bodyFont+';-webkit-font-smoothing:antialiased;',\n      cardStyle:(()=>{ const bg=t.tintCard?this.mix(PR,0.93):(t.cardBg2||t.cardBg); const bd=t.tintCard?('1px solid '+this.mix(PR,0.80)):t.cardBorder; const sh=t.tintCard?('0 18px 50px '+this.hexA(PR,0.16)):t.cardShadow; return 'background:'+bg+';border:'+bd+';box-shadow:'+sh+';border-radius:'+t.cardRadius+';padding:22px 22px 14px;'; })(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
